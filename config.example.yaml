audio:
  sample_rate: null
  frame_ms: 100
  bandpass_hz: [300, 3000]
  device: null

startup:
  auto_start_detection: false
  startup_delay_sec: 5

logging:
  level: INFO
  file: logs/qcii.log
  max_bytes: 5000000
  backup_count: 3

tone_pairs:
  - name: "Station 1"
    tone_a_hz: 687.5
    tone_b_hz: 937.5
    tone_a_ms: 600
    tone_b_ms: 600
    dropout_tolerance_ms: 50
    min_snr_db: 6
    action:
      gpio_pin: 17
      active_high: false
      hold_ms: 1500
      rearm_ms: 2000
      repeat_suppression_ms: 3000
      name: "Relay 1"
  - name: "Station 2"
    tone_a_hz: 566
    tone_b_hz: 598
    tone_a_ms: 600
    tone_b_ms: 600
    dropout_tolerance_ms: 50
    min_snr_db: 6
    action:
      gpio_pin: 27
      active_high: false
      hold_ms: 1500
      rearm_ms: 2000
      repeat_suppression_ms: 3000
      name: "Relay 2"
